<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>環教旅遊 2 號：綠色旅遊規劃大挑戰 (音效優化版)</title>
    <style>
        :root { --primary-green: #2d5a27; }
        
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; 
            background: #eaf6f5; 
            overflow: hidden; touch-action: none; 
            width: 100vw; height: 100vh; 
        }
        
        #game-stage { position: relative; width: 100%; height: 100%; }

        /* 標題與資訊列 */
        .header { position: absolute; top: 15px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .info-bar { display: flex; justify-content: space-around; align-items: center; width: 90%; margin: 0 auto; }
        #score-board, #timer { 
            font-size: 32px; font-weight: bold; color: var(--primary-green); 
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8); 
        }
        #timer.warning { color: #d32f2f; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 視覺元素容器 */
        #item-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .item { 
            position: absolute; 
            width: clamp(70px, 9vw, 120px); 
            height: clamp(70px, 9vw, 120px); 
            cursor: grab; z-index: 5; 
            touch-action: none; pointer-events: auto; user-select: none;
            will-change: transform; 
        }
        .item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* 下方規劃區域 */
        #planning-area { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 95%; display: flex; justify-content: center; align-items: center; 
            background: rgba(45, 90, 39, 0.05); padding: 15px; 
            border-radius: 20px; border: 2px dashed var(--primary-green);
        }
        
        .target-group { display: flex; align-items: center; justify-content: center; width: 100%; }
        
        .target-slot {
            width: clamp(100px, 18vw, 200px); 
            height: clamp(80px, 12vw, 140px); 
            border-radius: 10px; overflow: hidden;
            border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative; transition: transform 0.2s, border-color 0.2s;
            background-color: #fff;
        }
        .target-slot img { width: 100%; height: 100%; object-fit: cover; }
        .target-slot.hover { transform: scale(1.05); border-color: var(--primary-green); box-shadow: 0 0 15px var(--primary-green); }

        .plus-sign { font-size: clamp(30px, 4vw, 50px); font-weight: bold; color: #3b6d8c; margin: 0 1vw; }

        /* 視窗樣式 */
        #intro-screen, #message {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #fff; padding: 40px; border-radius: 30px; border: 6px solid var(--primary-green);
            text-align: center; max-width: 700px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-box h2 { color: var(--primary-green); font-size: 36px; margin-bottom: 20px; }
        .modal-box p { font-size: 24px; line-height: 1.6; color: #333; margin-bottom: 30px; }
        .action-btn { padding: 15px 45px; font-size: 26px; font-weight: bold; background: var(--primary-green); color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-stage">
        <div class="header" id="game-header">
            <h1>環教旅遊 2 號：綠色旅遊規劃大挑戰</h1>
            <div class="info-bar">
                <div id="score-board">累積積分：0 / 100</div>
                <div id="timer">剩餘時間：60s</div>
            </div>
        </div>

        <div id="item-container"></div>

        <div id="planning-area">
            <div class="target-group">
                <div class="target-slot" data-cat="1"><img src="1.png" alt="1 綠色景點"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="2"><img src="2.png" alt="2 交通選擇"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="3"><img src="3.png" alt="3 環保旅宿"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="4"><img src="4.png" alt="4 餐廳選擇"></div>
            </div>
        </div>
    </div>

    <div id="intro-screen">
        <div class="modal-box">
            <h2>綠色旅遊規劃大挑戰</h2>
            <p>歡迎參加減碳挑戰！請在 <strong>60 秒</strong>內，將畫面上的景點、交通工具、旅宿及餐廳等選項，組合成綠色旅遊行程。收集正確的組合可獲積分，率先達到 <strong>100 分</strong>即可過關，快來比看看誰才是綠色旅遊達人吧！</p>
            <button id="start-btn" class="action-btn">開始規劃</button>
        </div>
    </div>

    <div id="message" style="display:none;"></div>

    <audio id="sound-success" src="success.mp3" preload="auto"></audio>
    <audio id="sound-error" src="error.mp3" preload="auto"></audio>
    <audio id="sound-applaud" src="applaud.mp3" preload="auto"></audio>
    <audio id="sound-itsok" src="itsOK.mp3" preload="auto"></audio>

    <script>
        const itemData = [
            { id: '1-1', cat: 1, pt: 10 }, { id: '1-2', cat: 1, pt: 10 }, { id: '1-3', cat: 1, pt: 10 },
            { id: '1-4', cat: 1, pt: 10 }, { id: '1-5', cat: 1, pt: 10 }, { id: '1-6', cat: 1, pt: 10 },
            { id: '1-7', cat: 1, pt: 0 }, { id: '1-8', cat: 1, pt: 0 }, { id: '1-9', cat: 1, pt: 0 },
            { id: '2-1', cat: 2, pt: 10 }, { id: '2-2', cat: 2, pt: 10 }, { id: '2-3', cat: 2, pt: 10 },
            { id: '2-4', cat: 2, pt: 0 }, { id: '2-5', cat: 2, pt: 0 },
            { id: '3-1', cat: 3, pt: 10 }, { id: '3-2', cat: 3, pt: 0 },
            { id: '4-1', cat: 4, pt: 10 }, { id: '4-2', cat: 4, pt: 10 }, { id: '4-3', cat: 4, pt: 0 }
        ];

        let score = 0, timeLeft = 60, timerInterval, gameActive = false;
        const container = document.getElementById('item-container');
        const scoreBoard = document.getElementById('score-board');
        const timerDisplay = document.getElementById('timer');
        const slots = document.querySelectorAll('.target-slot');
        const msgBox = document.getElementById('message');

        // 動態網格分配法：確保物品只在頂部資訊列與下方收納區之間的「安全地帶」生成
        function shuffleItems() {
            container.innerHTML = '';
            
            // 動態取得畫面上方標題區與下方規劃區的邊界座標
            const headerRect = document.getElementById('game-header').getBoundingClientRect();
            const planningRect = document.getElementById('planning-area').getBoundingClientRect();

            const topMargin = headerRect.bottom + 20; // 頂部文字下方留 20px 安全距離
            const bottomBoundary = planningRect.top - 20; // 下方收納區上方留 20px 安全距離
            
            const itemBaseSize = window.innerWidth > 800 ? 120 : 80; 
            const safeGap = 20; 
            
            const cols = Math.floor((window.innerWidth - safeGap) / (itemBaseSize + safeGap));
            const rows = Math.floor((bottomBoundary - topMargin) / (itemBaseSize + safeGap));
            
            let gridCells = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    gridCells.push({
                        x: safeGap + c * (itemBaseSize + safeGap),
                        y: topMargin + r * (itemBaseSize + safeGap)
                    });
                }
            }

            // 打亂網格順序
            gridCells.sort(() => Math.random() - 0.5);

            itemData.forEach((data, index) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.dataset.id = data.id;
                
                let posX, posY;
                
                // 將物品放入網格，並給予微小偏移；若螢幕太小導致網格不夠，則在安全地帶內隨機放置
                if (gridCells[index]) {
                    const jitterX = (Math.random() - 0.5) * 15;
                    const jitterY = (Math.random() - 0.5) * 15;
                    posX = gridCells[index].x + jitterX;
                    posY = gridCells[index].y + jitterY;
                } else {
                    posX = Math.random() * (window.innerWidth - itemBaseSize);
                    posY = topMargin + Math.random() * (bottomBoundary - topMargin - itemBaseSize);
                }

                el.style.left = `${posX}px`;
                el.style.top = `${posY}px`;
                el.innerHTML = `<img src="${data.id}.png">`;
                container.appendChild(el);
                
                bindDrag(el, data);
            });
        }

        function bindDrag(el, data) {
            let active = false;
            let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
            let cachedSlots = []; 
            let startRect; 

            const dragStart = (e) => {
                if (!gameActive) return;
                const cx = (e.type === 'touchstart' ? e.touches[0].clientX : e.clientX);
                const cy = (e.type === 'touchstart' ? e.touches[0].clientY : e.clientY);
                initialX = cx - xOffset;
                initialY = cy - yOffset;
                active = true; 
                el.style.zIndex = 1000;

                cachedSlots = Array.from(slots).map(slot => ({
                    element: slot,
                    rect: slot.getBoundingClientRect(),
                    cat: slot.dataset.cat
                }));
                startRect = el.getBoundingClientRect();
            };

            const drag = (e) => {
                if (!active) return;
                e.preventDefault();
                const cx = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX);
                const cy = (e.type === 'touchmove' ? e.touches[0].clientY : e.clientY);
                
                currentX = cx - initialX;
                currentY = cy - initialY;
                xOffset = currentX; 
                yOffset = currentY;
                
                el.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                
                const itemCenterX = startRect.left + currentX + (startRect.width / 2);
                const itemCenterY = startRect.top + currentY + (startRect.height / 2);

                cachedSlots.forEach(slotData => {
                    if (itemCenterX > slotData.rect.left && itemCenterX < slotData.rect.right && 
                        itemCenterY > slotData.rect.top && itemCenterY < slotData.rect.bottom) {
                        if (slotData.cat == data.cat) {
                            slotData.element.classList.add('hover');
                        }
                    } else {
                        slotData.element.classList.remove('hover');
                    }
                });
            };

            const dragEnd = () => {
                if (!active) return;
                active = false;
                
                const rect = el.getBoundingClientRect();
                const itemCenterX = rect.left + rect.width / 2;
                const itemCenterY = rect.top + rect.height / 2;
                
                let isDropped = false;

                slots.forEach(slot => {
                    const sRect = slot.getBoundingClientRect();
                    if (itemCenterX > sRect.left && itemCenterX < sRect.right && 
                        itemCenterY > sRect.top && itemCenterY < sRect.bottom) {
                        if (slot.dataset.cat == data.cat) {
                            isDropped = true;
                            processScore(data, el);
                        }
                    }
                    slot.classList.remove('hover');
                });

                if (!isDropped) {
                    el.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                    el.style.transform = "translate3d(0, 0, 0)";
                    setTimeout(() => { el.style.transition = "none"; xOffset = 0; yOffset = 0; }, 400);
                }
            };

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, {passive: false});
            window.addEventListener('mousemove', drag);
            window.addEventListener('touchmove', drag, {passive: false});
            window.addEventListener('mouseup', dragEnd);
            window.addEventListener('touchend', dragEnd);
        }

        function processScore(data, el) {
            score += data.pt;
            scoreBoard.innerText = `累積積分：${score} / 100`;
            
            const snd = document.getElementById(data.pt > 0 ? 'sound-success' : 'sound-error');
            snd.currentTime = 0; 
            snd.play().catch(()=>{});

            el.remove();

            if (score >= 100) endGame(true);
        }

        function endGame(isWin) {
            gameActive = false;
            clearInterval(timerInterval);

            // 播放結算專屬音效
            const finalSoundId = isWin ? 'sound-applaud' : 'sound-itsok';
            const finalSnd = document.getElementById(finalSoundId);
            if (finalSnd) {
                finalSnd.currentTime = 0;
                finalSnd.play().catch(()=>{});
            }

            const title = isWin ? "恭喜過關！" : "再接再厲";
            const desc = isWin ? "您真是綠色旅遊規劃大師！" : "差一點就達標了，下次試著選更多加分項！";
            msgBox.innerHTML = `<div class="modal-box"><h2>${title}</h2><p>最終得分：${score}<br>${desc}</p><button onclick="location.reload()" class="action-btn">重新挑戰</button></div>`;
            msgBox.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('intro-screen').style.display = 'none';
            
            // 加入微小延遲確保 DOM 完全展開後再抓取邊界座標
            setTimeout(() => {
                gameActive = true;
                shuffleItems();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `剩餘時間：${timeLeft}s`;
                    if (timeLeft <= 10) timerDisplay.classList.add('warning');
                    if (timeLeft <= 0) endGame(false);
                }, 1000);
            }, 100);
        };
    </script>
</body>
</html>
