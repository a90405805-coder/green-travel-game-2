<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>環教旅遊 2 號：綠色旅遊規劃大挑戰 (PWA)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d5a27">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        :root { --primary-green: #2d5a27; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; background: #eaf6f5; 
            overflow: hidden; touch-action: none; 
            width: 100vw; height: 100vh; 
        }
        #game-stage { position: relative; width: 100%; height: 100%; }

        /* 頂部資訊列：避開上方空間 */
        .header { position: absolute; top: 0; width: 100%; height: 100px; text-align: center; z-index: 10; display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .info-bar { display: flex; justify-content: space-around; align-items: center; width: 90%; margin: 0 auto; }
        #score-board, #timer { font-size: 32px; font-weight: bold; color: var(--primary-green); text-shadow: 2px 2px 4px rgba(255,255,255,0.8); }
        #timer.warning { color: #d32f2f; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 物件容器 */
        #item-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .item { 
            position: absolute; width: clamp(70px, 9vw, 120px); height: clamp(70px, 9vw, 120px); 
            cursor: grab; z-index: 5; touch-action: none; pointer-events: auto; user-select: none;
            will-change: transform; 
        }
        .item img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        /* 下方規劃區域 */
        #planning-area { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 95%; display: flex; justify-content: center; align-items: center; 
            background: rgba(45, 90, 39, 0.05); padding: 15px; border-radius: 20px; border: 2px dashed var(--primary-green);
        }
        .target-group { display: flex; align-items: center; justify-content: center; width: 100%; }
        .target-slot {
            width: clamp(100px, 18vw, 200px); height: clamp(80px, 12vw, 140px); 
            border-radius: 10px; overflow: hidden; border: 3px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); background-color: #fff; transition: transform 0.2s;
        }
        .target-slot img { width: 100%; height: 100%; object-fit: cover; }
        .target-slot.hover { transform: scale(1.05); border-color: var(--primary-green); box-shadow: 0 0 15px var(--primary-green); }
        .plus-sign { font-size: clamp(30px, 4vw, 50px); font-weight: bold; color: #3b6d8c; margin: 0 1vw; }

        /* 彈窗樣式 */
        #intro-screen, #message { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; padding: 40px; border-radius: 30px; border: 6px solid var(--primary-green); text-align: center; max-width: 700px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .action-btn { padding: 15px 45px; font-size: 26px; font-weight: bold; background: var(--primary-green); color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-stage">
        <div class="header" id="game-header">
            <div class="info-bar">
                <div id="score-board">累積積分：0 / 100</div>
                <div id="timer">剩餘時間：60s</div>
            </div>
        </div>
        <div id="item-container"></div>
        <div id="planning-area">
            <div class="target-group">
                <div class="target-slot" data-cat="1"><img src="1.png"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="2"><img src="2.png"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="3"><img src="3.png"></div>
                <div class="plus-sign">+</div>
                <div class="target-slot" data-cat="4"><img src="4.png"></div>
            </div>
        </div>
    </div>

    <div id="intro-screen">
        <div class="modal-box">
            <h2>綠色旅遊規劃大挑戰</h2>
            <p>請在 60 秒內，將景點、交通、旅宿及餐廳選項拖移至下方區域。收集正確組合可獲積分，達到 100 分即可過關！</p>
            <button id="start-btn" class="action-btn">開始規劃</button>
        </div>
    </div>
    <div id="message" style="display:none;"></div>

    <audio id="sound-success" src="success.mp3" preload="auto"></audio>
    <audio id="sound-error" src="error.mp3" preload="auto"></audio>
    <audio id="sound-applaud" src="applaud.mp3" preload="auto"></audio>
    <audio id="sound-itsok" src="itsOK.mp3" preload="auto"></audio>

    <script>
        // PWA 註冊腳本
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('PWA Registered')).catch(err => console.log('PWA Failed', err));
            });
        }

        const itemData = [
            { id: '1-1', cat: 1, pt: 10 }, { id: '1-2', cat: 1, pt: 10 }, { id: '1-3', cat: 1, pt: 10 },
            { id: '1-4', cat: 1, pt: 10 }, { id: '1-5', cat: 1, pt: 10 }, { id: '1-6', cat: 1, pt: 10 },
            { id: '1-7', cat: 1, pt: 0 }, { id: '1-8', cat: 1, pt: 0 }, { id: '1-9', cat: 1, pt: 0 },
            { id: '2-1', cat: 2, pt: 10 }, { id: '2-2', cat: 2, pt: 10 }, { id: '2-3', cat: 2, pt: 10 },
            { id: '2-4', cat: 2, pt: 0 }, { id: '2-5', cat: 2, pt: 0 },
            { id: '3-1', cat: 3, pt: 10 }, { id: '3-2', cat: 3, pt: 0 },
            { id: '4-1', cat: 4, pt: 10 }, { id: '4-2', cat: 4, pt: 10 }, { id: '4-3', cat: 4, pt: 0 }
        ];

        let score = 0, timeLeft = 60, timerInterval, gameActive = false;
        const container = document.getElementById('item-container');
        const scoreBoard = document.getElementById('score-board');
        const timerDisplay = document.getElementById('timer');
        const slots = document.querySelectorAll('.target-slot');
        const msgBox = document.getElementById('message');

        // 防止與資訊列重疊的隨機分佈
        function shuffleItems() {
            container.innerHTML = '';
            const headerRect = document.getElementById('game-header').getBoundingClientRect();
            const planningRect = document.getElementById('planning-area').getBoundingClientRect();
            const topMargin = headerRect.bottom + 20;
            const bottomBoundary = planningRect.top - 20;
            const itemBaseSize = window.innerWidth > 800 ? 120 : 80;
            const safeGap = 20;
            
            const cols = Math.floor((window.innerWidth - safeGap) / (itemBaseSize + safeGap));
            const rows = Math.floor((bottomBoundary - topMargin) / (itemBaseSize + safeGap));
            
            let gridCells = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    gridCells.push({ x: safeGap + c * (itemBaseSize + safeGap), y: topMargin + r * (itemBaseSize + safeGap) });
                }
            }
            gridCells.sort(() => Math.random() - 0.5);
            
            itemData.forEach((data, index) => {
                const el = document.createElement('div');
                el.className = 'item';
                const pos = gridCells[index] || { x: Math.random() * (window.innerWidth - 100), y: topMargin + Math.random() * (bottomBoundary - topMargin - 100) };
                el.style.left = `${pos.x}px`; el.style.top = `${pos.y}px`;
                el.innerHTML = `<img src="${data.id}.png">`;
                container.appendChild(el);
                bindDrag(el, data);
            });
        }

        function bindDrag(el, data) {
            let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
            let cachedSlots = [];

            const dragStart = (e) => {
                if (!gameActive) return;
                const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                initialX = cx - xOffset; initialY = cy - yOffset;
                active = true; el.style.zIndex = 1000;
                cachedSlots = Array.from(slots).map(s => ({ element: s, rect: s.getBoundingClientRect(), cat: s.dataset.cat }));
            };

            const drag = (e) => {
                if (!active) return;
                e.preventDefault();
                const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                currentX = cx - initialX; currentY = cy - initialY;
                xOffset = currentX; yOffset = currentY;
                el.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                
                const itemRect = el.getBoundingClientRect();
                const centerX = itemRect.left + itemRect.width/2;
                const centerY = itemRect.top + itemRect.height/2;

                cachedSlots.forEach(s => {
                    if (centerX > s.rect.left && centerX < s.rect.right && centerY > s.rect.top && centerY < s.rect.bottom && s.cat == data.cat) s.element.classList.add('hover');
                    else s.element.classList.remove('hover');
                });
            };

            const dragEnd = () => {
                if (!active) return;
                active = false;
                const rect = el.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let isDropped = false;

                slots.forEach(slot => {
                    const sRect = slot.getBoundingClientRect();
                    if (centerX > sRect.left && centerX < sRect.right && centerY > sRect.top && centerY < sRect.bottom && slot.dataset.cat == data.cat) {
                        isDropped = true;
                        score += data.pt;
                        scoreBoard.innerText = `累積積分：${score} / 100`;
                        document.getElementById(data.pt > 0 ? 'sound-success' : 'sound-error').play();
                        el.remove();
                        if (score >= 100) endGame(true);
                    }
                    slot.classList.remove('hover');
                });

                if (!isDropped) {
                    el.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                    el.style.transform = "translate3d(0, 0, 0)";
                    setTimeout(() => { el.style.transition = "none"; xOffset = 0; yOffset = 0; }, 400);
                }
            };

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, {passive: false});
            window.addEventListener('mousemove', drag);
            window.addEventListener('touchmove', drag, {passive: false});
            window.addEventListener('mouseup', dragEnd);
            window.addEventListener('touchend', dragEnd);
        }

        function endGame(isWin) {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById(isWin ? 'sound-applaud' : 'sound-itsok').play();
            msgBox.innerHTML = `<div class="modal-box"><h2>${isWin ? "恭喜過關！" : "再接再厲"}</h2><p>最終得分：${score}</p><button onclick="location.reload()" class="action-btn">重新挑戰</button></div>`;
            msgBox.style.display = 'flex';
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('intro-screen').style.display = 'none';
            gameActive = true; shuffleItems();
            timerInterval = setInterval(() => {
                timeLeft--; timerDisplay.innerText = `剩餘時間：${timeLeft}s`;
                if (timeLeft <= 10) timerDisplay.classList.add('warning');
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        };
    </script>
</body>
</html>
